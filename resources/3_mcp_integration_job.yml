resources:
  jobs:
    mcp_integration_job:
      name: 3-mcp-integration
      tags:
        project_name: "llmops-databricks-course-numericalmachinelearning"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: run_notebook
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/3_mcp_integration.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
